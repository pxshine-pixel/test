<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投资组合追踪器</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <header>
      <h1>📊 投资组合追踪器</h1>
      <p class="subtitle">录入持仓，自动计算总盈亏与资产配置（数据仅存于本地浏览器）</p>
    </header>

    <section class="summary" id="summary">
      <div class="stat">
        <span class="stat-label">总市值</span>
        <strong class="stat-value" id="sumValue">¥0.00</strong>
      </div>
      <div class="stat">
        <span class="stat-label">总成本</span>
        <strong class="stat-value" id="sumCost">¥0.00</strong>
      </div>
      <div class="stat">
        <span class="stat-label">总盈亏</span>
        <strong class="stat-value" id="sumProfit">¥0.00</strong>
      </div>
      <div class="stat">
        <span class="stat-label">总收益率</span>
        <strong class="stat-value" id="sumReturn">0.00%</strong>
      </div>
    </section>

    <div class="layout">
      <section class="card chart-card">
        <h2>资产配置</h2>
        <svg id="pie" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="资产配置饼图"></svg>
        <ul class="legend" id="legend"></ul>
      </section>

      <section class="card table-card">
        <div class="card-head">
          <h2>持仓明细</h2>
          <button id="addBtn" class="add">＋ 添加持仓</button>
        </div>
        <div class="table-wrap">
          <table id="holdings">
            <thead>
              <tr>
                <th>名称/代码</th>
                <th>数量</th>
                <th>成本价</th>
                <th>现价</th>
                <th>市值</th>
                <th>盈亏</th>
                <th>收益率</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
        <p class="empty" id="empty" hidden>还没有持仓，点击「添加持仓」开始记录。</p>
      </section>
    </div>

    <div class="actions">
      <button id="sampleBtn" class="secondary">载入示例</button>
      <button id="clearBtn" class="secondary danger">清空全部</button>
    </div>

    <footer>
      <p class="disclaimer">数据只保存在你当前浏览器（localStorage），不会上传。现价需手动更新，本工具不构成投资建议。</p>
    </footer>
  </main>

  <script src="portfolio.js"></script>
  <script src="app.js"></script>
</body>
</html>
