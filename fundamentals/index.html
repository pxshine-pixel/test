<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基本面汇总排序</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <header>
      <h1>🏅 基本面汇总排序</h1>
      <p class="subtitle">粘贴 /score 打分后的股票（JSON / 表格 / 「名称 分数」），按基本面分数排序</p>
    </header>

    <section class="input-card">
      <textarea id="input" rows="6" placeholder='粘贴 /score 输出，支持：
· JSON：[{"name":"茅台","code":"600519","score":85,"pe":30}]
· Markdown / CSV 表格（含表头）
· 每行「名称 分数」：贵州茅台 85'></textarea>
      <div class="actions">
        <button id="parseBtn" class="btn primary">解析并排序</button>
        <button id="sampleBtn" class="btn">示例</button>
        <button id="clearBtn" class="btn ghost">清空</button>
        <label class="score-pick" id="scorePickWrap" hidden>
          排序列
          <select id="scoreKey"></select>
        </label>
        <button id="exportBtn" class="btn ghost" hidden>导出 CSV</button>
      </div>
      <p class="warn" id="warn" hidden></p>
    </section>

    <section class="stats" id="stats" hidden></section>

    <section class="result" id="result"></section>

    <footer>
      <p class="disclaimer">数据仅在本地浏览器处理与保存，不上传。基本面分数由你的 /score 提供，本工具只做汇总与排序。</p>
    </footer>
  </main>

  <script src="fundamentals.js"></script>
  <script src="app.js"></script>
</body>
</html>
